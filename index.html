<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f59e0b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>飲酒管理</title>
<style>
:root {
  --bg: #f2f2ef; --card: #ffffff; --ink: #33302b; --sub: #7c766c; --muted: #aaa49a;
  --line: #e4e2dc; --green: #15997a; --green-bg: #d9f4e8; --amber: #d97706; --amber-bg: #fdeed3;
  --red: #e05252; --red-bg: #fde3e3; --blue: #3b82d6; --accent: #f59e0b;
  --shadow: 0 2px 10px rgba(120, 110, 90, .12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  font-size: 15px; line-height: 1.6;
  padding: 0 14px calc(30px + env(safe-area-inset-bottom));
  max-width: 460px; margin: 0 auto;
}
.appbar {
  background: linear-gradient(120deg, #f59e0b, #f97350);
  margin: 0 -14px; padding: calc(14px + env(safe-area-inset-top)) 20px 14px;
  display: flex; justify-content: space-between; align-items: baseline;
  border-radius: 0 0 22px 22px; color: #fff;
}
.appbar h1 { font-size: 19px; font-weight: 700; letter-spacing: .02em; }
.appbar .date { font-size: 14px; font-weight: 600; opacity: .95; }
.streak {
  display: inline-block; margin-top: 10px; font-size: 12.5px; font-weight: 600;
  background: var(--amber-bg); color: var(--amber); border-radius: 999px; padding: 4px 12px;
}
.card { background: var(--card); border-radius: 18px; padding: 16px; margin-top: 12px; box-shadow: var(--shadow); }
.row { display: flex; justify-content: space-between; align-items: baseline; }
.label { font-size: 12px; color: var(--sub); font-weight: 600; }
.big { font-size: 34px; font-weight: 700; line-height: 1.2; }
.unit { font-size: 13px; color: var(--sub); font-weight: 400; }
.bar { height: 14px; background: var(--bg); border-radius: 7px; margin-top: 10px; overflow: hidden; }
.bar > div { height: 100%; border-radius: 7px; transition: width .4s; }
.msg { font-size: 13.5px; margin-top: 8px; font-weight: 600; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 10px; }
button { font-family: inherit; font-size: 13px; color: var(--ink); background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 10px 6px; cursor: pointer; transition: transform .08s; }
button:active { transform: scale(.93); }
.drinkbtn { display: flex; flex-direction: column; align-items: center; gap: 1px; border: none; padding: 11px 4px 9px; }
.drinkbtn .emoji { font-size: 26px; line-height: 1.2; }
.drinkbtn b { font-size: 13px; font-weight: 700; }
.drinkbtn span { font-size: 11px; opacity: .75; font-weight: 600; }
.restbtn { width: 100%; margin-top: 10px; padding: 13px; font-size: 14.5px; color: #fff; background: linear-gradient(120deg, #18ac82, #3cc9a0); border: none; border-radius: 14px; font-weight: 700; }
.restbtn.off { color: var(--green); background: var(--green-bg); }
.log { margin-top: 10px; }
.log .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px dashed var(--line); font-size: 14px; }
.log .item small { color: var(--muted); margin-right: 8px; }
.log .item .g { color: var(--sub); font-size: 12.5px; }
.del { border: none; background: none; color: var(--muted); font-size: 16px; padding: 4px 8px; }
.chart { display: flex; align-items: flex-end; gap: 8px; height: 110px; margin-top: 12px; }
.chart .col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; gap: 3px; }
.chart .col .v { font-size: 10.5px; color: var(--muted); font-weight: 600; }
.chart .col .b { width: 100%; border-radius: 6px 6px 2px 2px; min-height: 2px; }
.days { display: flex; gap: 8px; margin-top: 5px; }
.days div { flex: 1; text-align: center; font-size: 11.5px; color: var(--muted); font-weight: 600; }
.days .sat { color: var(--blue); }
.days .sun { color: var(--red); }
.days .today { color: var(--ink); background: var(--amber-bg); border-radius: 6px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 10px; }
.stat { border-radius: 14px; padding: 11px 9px; }
.stat .label { font-size: 11px; }
.stat b { font-size: 18px; font-weight: 700; }
.stat.s1 { background: var(--green-bg); } .stat.s1 b, .stat.s1 .label { color: var(--green); }
.stat.s2 { background: var(--amber-bg); } .stat.s2 b, .stat.s2 .label { color: var(--amber); }
.stat.s3 { background: var(--red-bg); } .stat.s3 b, .stat.s3 .label { color: var(--red); }
details { margin-top: 14px; }
summary { font-size: 13px; color: var(--sub); cursor: pointer; padding: 6px 0; font-weight: 600; }
input, select { font-family: inherit; font-size: 14px; color: var(--ink); background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; width: 100%; }
.form-row { display: flex; gap: 6px; margin-top: 8px; }
.form-row label { flex: 1; font-size: 11px; color: var(--sub); }
.form-row input { margin-top: 2px; }
.primary { background: linear-gradient(120deg, #f59e0b, #f97350); color: #fff; border: none; font-weight: 700; padding: 12px; width: 100%; margin-top: 10px; border-radius: 12px; font-size: 14px; }
.menu-item { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-top: 1px dashed var(--line); font-size: 13.5px; }
.menu-item span { color: var(--sub); font-size: 12px; }
.hidden { display: none; }
.footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 22px; }
.fly { position: fixed; font-size: 26px; pointer-events: none; animation: fly 1.1s ease-out forwards; z-index: 9; }
@keyframes fly {
  0% { transform: translateY(0) scale(.6); opacity: 0; }
  15% { opacity: 1; }
  100% { transform: translateY(-130px) scale(1.3) rotate(20deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="appbar">
  <h1>🍺 飲酒管理</h1>
  <span class="date" id="dateTitle"></span>
</div>
<span class="streak hidden" id="streak"></span>

<div class="card">
  <div class="label">今日の純アルコール量</div>
  <div><span class="big" id="todayG">0</span><span class="unit"> g ／ 目標 <span id="targetG"></span>g</span></div>
  <div class="bar"><div id="barFill" style="width:0%"></div></div>
  <div class="msg" id="todayMsg"></div>
</div>

<div class="card">
  <div class="label">ワンタップ記録</div>
  <div class="grid" id="drinkBtns"></div>
  <div id="customForm" class="hidden">
    <div class="form-row">
      <label>名前<input id="cName" placeholder="例：梅酒ロック"></label>
      <label>量(ml)<input id="cMl" type="number" inputmode="numeric" placeholder="90"></label>
    </div>
    <div class="form-row">
      <label>度数(%)<input id="cAbv" type="number" inputmode="decimal" placeholder="12"></label>
      <label>金額(円)<input id="cPrice" type="number" inputmode="numeric" placeholder="200"></label>
    </div>
    <button class="primary" onclick="addCustom()">記録する</button>
  </div>
  <button class="restbtn off" id="restBtn" onclick="toggleRest()"></button>
  <div class="log" id="todayLog"></div>
</div>

<div class="card">
  <div class="row">
    <div class="label">直近7日間（g）</div>
    <div class="label" id="weekRest"></div>
  </div>
  <div class="chart" id="chart"></div>
  <div class="days" id="chartDays"></div>
</div>

<div class="card">
  <div class="label" id="monthTitle"></div>
  <div class="stats">
    <div class="stat s1"><div class="label">🌿 休肝日</div><b id="mRest">0</b><span class="unit">日</span></div>
    <div class="stat s2"><div class="label">💰 酒代</div><b id="mCost">¥0</b></div>
    <div class="stat s3"><div class="label">📊 1日平均</div><b id="mAvg">0</b><span class="unit">g</span></div>
  </div>
</div>

<details>
  <summary>⚙️ 設定・メニュー編集</summary>
  <div class="card">
    <div class="form-row">
      <label>1日の目標（純アルコールg）<input id="sTarget" type="number" inputmode="numeric"></label>
      <label>週の休肝日目標（日）<input id="sRest" type="number" inputmode="numeric"></label>
    </div>
    <button class="primary" onclick="saveSettings()">設定を保存</button>

    <div class="label" style="margin-top:16px">ワンタップメニュー</div>
    <div id="menuList"></div>
    <div class="form-row">
      <label>名前<input id="mName" placeholder="例：ビール中瓶"></label>
      <label>量(ml)<input id="mMl" type="number" inputmode="numeric"></label>
    </div>
    <div class="form-row">
      <label>度数(%)<input id="mAbv" type="number" inputmode="decimal"></label>
      <label>金額(円)<input id="mPrice" type="number" inputmode="numeric"></label>
    </div>
    <button class="primary" onclick="addMenu()">メニューに追加</button>

    <div class="label" style="margin-top:16px">データ</div>
    <div class="form-row">
      <button style="flex:1" onclick="exportData()">バックアップ保存</button>
      <button style="flex:1" onclick="document.getElementById('importFile').click()">復元</button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this)">
    </div>
  </div>
</details>

<div class="footer">純アルコール量 = 量(ml) × 度数(%) ÷ 100 × 0.8<br>厚労省の目安：1日20g程度・週2日以上の休肝日 🍶</div>

<script>
const LS_LOG = 'inshu_log', LS_SET = 'inshu_settings';

const defaultSettings = {
  targetG: 20,
  restTarget: 2,
  drinks: [
    { name: 'ビール中瓶', ml: 500, abv: 5, price: 350 },
    { name: 'ビール350缶', ml: 350, abv: 5, price: 220 },
    { name: 'ハイボール缶', ml: 350, abv: 7, price: 180 },
    { name: '日本酒1合', ml: 180, abv: 15, price: 300 },
    { name: 'ワイングラス', ml: 120, abv: 12, price: 250 },
    { name: '焼酎ロック', ml: 90, abv: 25, price: 150 }
  ]
};

const btnColors = [
  { bg: '#fff1bf', fg: '#7a5c00' }, { bg: '#ffe3c2', fg: '#8a4b00' }, { bg: '#ffd9d9', fg: '#9c2f2f' },
  { bg: '#e9ddff', fg: '#5b3b9e' }, { bg: '#cdf0e2', fg: '#0b6b52' }, { bg: '#d6e9ff', fg: '#1b5fa8' }
];
function emojiFor(name) {
  if (/ビール|生|発泡|エール/.test(name)) return '🍺';
  if (/ワイン|赤|白/.test(name)) return '🍷';
  if (/日本酒|冷酒|燗|純米|吟醸/.test(name)) return '🍶';
  if (/シャンパン|スパークリング/.test(name)) return '🥂';
  if (/チューハイ|サワー|カクテル|梅酒|レモン/.test(name)) return '🍹';
  if (/ハイボール|ウイスキー|ウィスキー|焼酎|ブランデー|ジン|ウォッカ/.test(name)) return '🥃';
  return '🍸';
}

let settings = load(LS_SET) || defaultSettings;
let log = load(LS_LOG) || {};

function load(k) { try { return JSON.parse(localStorage.getItem(k)); } catch (e) { return null; } }
function save() {
  localStorage.setItem(LS_LOG, JSON.stringify(log));
  localStorage.setItem(LS_SET, JSON.stringify(settings));
}

function dateKey(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}
function todayKey() { return dateKey(new Date()); }
function pureG(ml, abv) { return Math.round(ml * abv / 100 * 0.8 * 10) / 10; }
function day(k) { return log[k] || { items: [], rest: false }; }
function dayG(k) { return Math.round(day(k).items.reduce((s, i) => s + i.g, 0) * 10) / 10; }

function celebrate(emojis, x, y) {
  emojis.forEach((e, i) => {
    const s = document.createElement('span');
    s.className = 'fly'; s.textContent = e;
    s.style.left = (x - 30 + Math.random() * 60) + 'px';
    s.style.top = (y - 10 + Math.random() * 20) + 'px';
    s.style.animationDelay = (i * 0.09) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1600);
  });
}

function addItem(name, ml, abv, price, ev) {
  const k = todayKey();
  if (!log[k]) log[k] = { items: [], rest: false };
  log[k].rest = false;
  const t = new Date();
  log[k].items.push({
    id: Date.now(), name: name, g: pureG(ml, abv), price: Number(price) || 0,
    time: String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0')
  });
  save(); render();
  if (ev) celebrate([emojiFor(name)], ev.clientX || innerWidth / 2, ev.clientY || 300);
}

function addCustom() {
  const name = document.getElementById('cName').value.trim() || 'その他';
  const ml = Number(document.getElementById('cMl').value);
  const abv = Number(document.getElementById('cAbv').value);
  const price = Number(document.getElementById('cPrice').value) || 0;
  if (!ml || !abv) { alert('量と度数を入力してください'); return; }
  addItem(name, ml, abv, price);
  ['cName', 'cMl', 'cAbv', 'cPrice'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('customForm').classList.add('hidden');
}

function removeItem(id) {
  const k = todayKey();
  if (!log[k]) return;
  log[k].items = log[k].items.filter(i => i.id !== id);
  save(); render();
}

function toggleRest(ev) {
  const k = todayKey();
  if (!log[k]) log[k] = { items: [], rest: false };
  if (log[k].items.length > 0) { alert('今日はすでに記録があります。休肝日にするには記録を削除してください。'); return; }
  log[k].rest = !log[k].rest;
  save(); render();
  if (log[k].rest && ev) celebrate(['🌿', '✨', '💚'], ev.clientX || innerWidth / 2, ev.clientY || 400);
}

function saveSettings() {
  const t = Number(document.getElementById('sTarget').value);
  const r = Number(document.getElementById('sRest').value);
  if (t > 0) settings.targetG = t;
  if (r >= 0) settings.restTarget = r;
  save(); render();
}

function addMenu() {
  const name = document.getElementById('mName').value.trim();
  const ml = Number(document.getElementById('mMl').value);
  const abv = Number(document.getElementById('mAbv').value);
  const price = Number(document.getElementById('mPrice').value) || 0;
  if (!name || !ml || !abv) { alert('名前・量・度数を入力してください'); return; }
  settings.drinks.push({ name, ml, abv, price });
  ['mName', 'mMl', 'mAbv', 'mPrice'].forEach(id => document.getElementById(id).value = '');
  save(); render();
}

function removeMenu(i) {
  settings.drinks.splice(i, 1);
  save(); render();
}

function exportData() {
  const blob = new Blob([JSON.stringify({ log, settings }, null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '飲酒管理バックアップ_' + todayKey() + '.json';
  a.click();
}

function importData(input) {
  const f = input.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (d.log && d.settings) {
        log = d.log; settings = d.settings; save(); render();
        alert('復元しました');
      } else { alert('バックアップファイルの形式が違います'); }
    } catch (e) { alert('読み込めませんでした'); }
  };
  r.readAsText(f);
  input.value = '';
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function render() {
  const now = new Date(), k = todayKey();
  const youbi = ['日', '月', '火', '水', '木', '金', '土'];
  document.getElementById('dateTitle').textContent = (now.getMonth() + 1) + '月' + now.getDate() + '日（' + youbi[now.getDay()] + '）';

  const g = dayG(k), target = settings.targetG;
  document.getElementById('todayG').textContent = g;
  document.getElementById('targetG').textContent = target;
  const pct = Math.min(100, g / target * 100);
  const fill = document.getElementById('barFill');
  fill.style.width = pct + '%';
  const msg = document.getElementById('todayMsg');
  const bigEl = document.getElementById('todayG');
  if (day(k).rest) {
    fill.style.background = 'linear-gradient(90deg,#18ac82,#3cc9a0)'; fill.style.width = '100%';
    msg.textContent = '🌿 今日は休肝日です。肝臓が喜んでいます'; msg.style.color = 'var(--green)';
    bigEl.style.color = 'var(--green)';
  } else if (g === 0) {
    msg.textContent = 'まだ記録がありません'; msg.style.color = 'var(--muted)';
    bigEl.style.color = 'var(--ink)';
  } else if (g <= target) {
    fill.style.background = 'linear-gradient(90deg,#18ac82,#3cc9a0)';
    msg.textContent = '😊 目標の範囲内です（残り ' + Math.round((target - g) * 10) / 10 + 'g）'; msg.style.color = 'var(--green)';
    bigEl.style.color = 'var(--green)';
  } else if (g <= target * 2) {
    fill.style.background = 'linear-gradient(90deg,#f5a623,#f97316)';
    msg.textContent = '😅 目標を ' + Math.round((g - target) * 10) / 10 + 'g 超えています'; msg.style.color = 'var(--amber)';
    bigEl.style.color = 'var(--amber)';
  } else {
    fill.style.background = 'linear-gradient(90deg,#ef4444,#dc2626)';
    msg.textContent = '🙈 飲みすぎです（目標の' + Math.round(g / target * 10) / 10 + '倍）'; msg.style.color = 'var(--red)';
    bigEl.style.color = 'var(--red)';
  }

  const btns = document.getElementById('drinkBtns');
  btns.innerHTML = '';
  const pal = btnColors;
  settings.drinks.forEach((d, i) => {
    const c = pal[i % pal.length];
    const b = document.createElement('button');
    b.className = 'drinkbtn';
    b.style.background = c.bg; b.style.color = c.fg;
    b.innerHTML = '<span class="emoji">' + emojiFor(d.name) + '</span><b>' + esc(d.name) + '</b><span>' + pureG(d.ml, d.abv) + 'g</span>';
    b.onclick = (ev) => addItem(d.name, d.ml, d.abv, d.price, ev);
    btns.appendChild(b);
  });
  const other = document.createElement('button');
  other.className = 'drinkbtn';
  other.style.background = 'var(--bg)'; other.style.color = 'var(--sub)';
  other.innerHTML = '<span class="emoji">➕</span><b>その他</b><span>手入力</span>';
  other.onclick = () => document.getElementById('customForm').classList.toggle('hidden');
  btns.appendChild(other);

  const restBtn = document.getElementById('restBtn');
  if (day(k).rest) { restBtn.textContent = '🌿 今日は休肝日！'; restBtn.className = 'restbtn'; }
  else { restBtn.textContent = '今日は飲まない（休肝日にする）'; restBtn.className = 'restbtn off'; }
  restBtn.onclick = (ev) => toggleRest(ev);

  const tl = document.getElementById('todayLog');
  tl.innerHTML = '';
  day(k).items.forEach(i => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = '<span><small>' + i.time + '</small>' + emojiFor(i.name) + ' ' + esc(i.name) + ' <span class="g">' + i.g + 'g</span></span>';
    const del = document.createElement('button');
    del.className = 'del'; del.textContent = '×';
    del.onclick = () => { if (confirm(i.name + ' を削除しますか？')) removeItem(i.id); };
    div.appendChild(del);
    tl.appendChild(div);
  });

  const chart = document.getElementById('chart'), daysEl = document.getElementById('chartDays');
  chart.innerHTML = ''; daysEl.innerHTML = '';
  let weekRest = 0, maxG = target * 2;
  const week = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const kk = dateKey(d);
    week.push({ d, g: dayG(kk), rest: day(kk).rest });
  }
  week.forEach(w => { if (w.g > maxG) maxG = w.g; });
  week.forEach((w, idx) => {
    const col = document.createElement('div'); col.className = 'col';
    if (w.rest) {
      col.innerHTML = '<div class="v">🌿</div><div class="b" style="height:8px;background:var(--green)"></div>';
      weekRest++;
    } else if (w.g === 0) {
      col.innerHTML = '<div class="v">–</div><div class="b" style="height:2px;background:var(--line)"></div>';
    } else {
      const h = Math.max(5, w.g / maxG * 100);
      const color = w.g <= target ? 'linear-gradient(180deg,#3cc9a0,#18ac82)' : (w.g <= target * 2 ? 'linear-gradient(180deg,#f5a623,#f97316)' : 'linear-gradient(180deg,#ef4444,#dc2626)');
      col.innerHTML = '<div class="v">' + w.g + '</div><div class="b" style="height:' + h + '%;background:' + color + '"></div>';
    }
    chart.appendChild(col);
    const dl = document.createElement('div');
    dl.textContent = youbi[w.d.getDay()];
    if (w.d.getDay() === 0) dl.className = 'sun';
    if (w.d.getDay() === 6) dl.className = 'sat';
    if (idx === 6) dl.className = 'today';
    daysEl.appendChild(dl);
  });
  document.getElementById('weekRest').textContent = '🌿 休肝日 ' + weekRest + '/' + settings.restTarget + '日';

  const y = now.getFullYear(), m = now.getMonth();
  document.getElementById('monthTitle').textContent = '📅 ' + (m + 1) + '月のまとめ';
  let mRest = 0, mCost = 0, mG = 0, mDays = 0;
  Object.keys(log).forEach(kk => {
    const p = kk.split('-');
    if (Number(p[0]) === y && Number(p[1]) === m + 1) {
      const dd = log[kk];
      if (dd.rest) mRest++;
      dd.items.forEach(i => { mCost += i.price; mG += i.g; });
      if (dd.rest || dd.items.length) mDays++;
    }
  });
  document.getElementById('mRest').textContent = mRest;
  document.getElementById('mCost').textContent = '¥' + mCost.toLocaleString();
  document.getElementById('mAvg').textContent = mDays ? Math.round(mG / mDays * 10) / 10 : 0;

  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const kk = dateKey(d), dd = day(kk);
    if (dd.items.length === 0 || dayG(kk) <= target) {
      if (dd.items.length === 0 && !dd.rest && i > 0) break;
      streak++;
    } else break;
  }
  const st = document.getElementById('streak');
  if (streak >= 2) { st.textContent = '🔥 目標達成 ' + streak + '日連続！'; st.classList.remove('hidden'); }
  else st.classList.add('hidden');

  document.getElementById('sTarget').value = settings.targetG;
  document.getElementById('sRest').value = settings.restTarget;
  const ml = document.getElementById('menuList');
  ml.innerHTML = '';
  settings.drinks.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'menu-item';
    div.innerHTML = '<span style="color:var(--ink)">' + emojiFor(d.name) + ' ' + esc(d.name) + '</span><span>' + d.ml + 'ml・' + d.abv + '%・¥' + d.price + '（' + pureG(d.ml, d.abv) + 'g）</span>';
    const del = document.createElement('button');
    del.className = 'del'; del.textContent = '×';
    del.onclick = () => { if (confirm(d.name + ' をメニューから削除しますか？')) removeMenu(i); };
    div.appendChild(del);
    ml.appendChild(div);
  });

}

render();
setInterval(() => { render(); }, 60000);
</script>
</body>
</html>
